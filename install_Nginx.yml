---
- name : Install Nginx
  hosts : localhost
  become : true
  tasks : 
    - name : Install Nginx
      ansible.builtin.dnf:
        name : nginx
        state : present

    - name : start nginx and enables
      ansible.builtin.systemd_service:
        name : nginx
        state : stopped
        enabled : true

    - name : start Apache and enables
      ansible.builtin.systemd_service:
        name : httpd
        state : started
        enabled : true

    - name : host simple html page on nginx
      ansible.builtin.copy:
        dest: /usr/share/nginx/html/index.html
        content: '<h1> This is HTML page from ANSIBLE </h1>'
        