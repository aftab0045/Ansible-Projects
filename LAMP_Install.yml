# Install LAMP Stack
---
- name : Install LAMP 
  hosts : localhost
  become : true
  tasks : 
    - name : Install Apache
      ansible.builtin.dnf:
       name : httpd
       state : present

    - name : Install mariadb
      ansible.builtin.dnf:
       name : mariadb105-server
       state : present
    
    - name : Install php and php-fpm
      ansible.builtin.dnf:
       name : 
        - php
        - php-fpm
       state : present
    
    - name : start htpd 
      ansible.builtin.systemd_service:
        name : httpd
        state : started
        enabled : true
    
    - name : start mariadb
      ansible.builtin.systemd_service:
        name : mariadb
        state : started
        enabled : true

    - name : start php-fpm
      ansible.builtin.systemd_service:
        name : php-fpm
        state : started
        enabled : true


    - name : Host index.php page
      ansible.builtin.copy:
        dest : /var/www/html/index.php
        content : 
          <?php
          phpinfo();
          ?>
    
  